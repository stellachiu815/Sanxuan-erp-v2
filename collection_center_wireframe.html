<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<title>台北三玄宮 ERP — 收款中心 低保真 Wireframe（V7.1）</title>
<style>
  :root {
    --bg: #FBF7EE;           /* 暖白 */
    --primary: #F3E8C9;      /* 淡奶油黃 */
    --accent: #F0DDC0;       /* 淡杏色 */
    --secondary: #EFE3B4;    /* 淡菊黃 */
    --done: #A9C1AE;         /* 鼠尾草綠 */
    --info: #C7DCE4;         /* 淡湖水藍 */
    --unpaid: #E3C7CB;       /* 灰粉玫瑰色 */
    --text: #5B5347;
    --text-light: #8C8375;
    --card-bg: #FFFDF8;
    --border: #E9E1CF;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0;
    background: var(--bg);
    font-family: "Noto Sans TC", "PingFang TC", "Microsoft JhengHei", sans-serif;
    color: var(--text);
  }
  header.app-header {
    padding: 20px 32px;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
  }
  header.app-header h1 { font-size: 20px; margin: 0 0 4px; font-weight: 600; }
  header.app-header p { margin: 0; font-size: 13px; color: var(--text-light); }
  nav.screen-tabs {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 16px 32px; background: var(--bg);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 5;
  }
  nav.screen-tabs button {
    border: 1px solid var(--border);
    background: var(--card-bg);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
  }
  nav.screen-tabs button.active {
    background: var(--secondary);
    border-color: var(--secondary);
    font-weight: 600;
  }
  main { padding: 24px 32px 64px; max-width: 1080px; margin: 0 auto; }
  .screen { display: none; }
  .screen.active { display: block; }
  .screen-title { font-size: 16px; font-weight: 600; margin: 0 0 4px; }
  .screen-desc { font-size: 12px; color: var(--text-light); margin: 0 0 20px; }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 20px 22px;
    margin-bottom: 16px;
    box-shadow: 0 1px 2px rgba(90,80,60,0.04);
  }
  .card h3 { margin: 0 0 12px; font-size: 14px; font-weight: 600; }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .field {
    flex: 1; min-width: 140px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 10px 12px;
    font-size: 12px;
    color: var(--text-light);
  }
  .field b { display: block; color: var(--text); font-size: 13px; font-weight: 500; margin-top: 2px; }
  .btn {
    display: inline-block;
    border: none;
    border-radius: 999px;
    padding: 10px 20px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    color: var(--text);
  }
  .btn-primary { background: var(--primary); }
  .btn-accent { background: var(--accent); }
  .btn-outline { background: var(--card-bg); border: 1px solid var(--border); }
  .tag {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 600;
  }
  .tag-unpaid { background: var(--unpaid); color: #6b4048; }
  .tag-partial { background: var(--info); color: #3d5c66; }
  .tag-paid { background: var(--done); color: #33513a; }
  .tag-overpaid { background: var(--unpaid); color: #6b4048; }
  .tag-refund { background: var(--unpaid); color: #6b4048; }
  .tag-refunded { background: var(--done); color: #33513a; }
  .tag-voided { background: #E7E1D6; color: #8c8375; }
  table { width: 100%; border-collapse: collapse; font-size: 12.5px; }
  th, td { text-align: left; padding: 8px 10px; border-bottom: 1px solid var(--border); }
  th { color: var(--text-light); font-weight: 500; }
  .totals-bar {
    display: flex; gap: 10px; flex-wrap: wrap; margin-top: 12px;
  }
  .totals-bar .field { text-align: center; }
  .search-box {
    display: flex; gap: 10px; margin-bottom: 16px;
  }
  .search-box input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 10px 16px;
    font-size: 13px;
    background: var(--card-bg);
  }
  .filter-chip {
    background: var(--secondary);
    border-radius: 999px;
    padding: 4px 12px;
    font-size: 11px;
    margin-right: 6px;
  }
  .note-box {
    background: var(--info);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 12px;
    color: #3d5c66;
    margin-top: 12px;
  }
  .warn-box {
    background: var(--unpaid);
    border-radius: 12px;
    padding: 10px 14px;
    font-size: 12px;
    color: #6b4048;
    margin-top: 12px;
  }
  .name-list { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .name-chip {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 999px;
    padding: 4px 10px;
    font-size: 12px;
  }
  .footer-note {
    font-size: 11px; color: var(--text-light); text-align: center; margin-top: 32px;
  }
</style>
</head>

</header>

const tabsEl = document.getElementById("tabs");
const screensEl = document.getElementById("screens");

screens.forEach((s, i) => {
  const btn = document.createElement("button");
  btn.textContent = s.label;
  btn.dataset.target = s.id;
  if (i === 0) btn.classList.add("active");
  btn.onclick = () => showScreen(s.id);
  tabsEl.appendChild(btn);

  const div = document.createElement("div");
  div.className = "screen" + (i === 0 ? " active" : "");
  div.id = "screen-" + s.id;
  div.innerHTML = `<h2 class="screen-title">${s.title}</h2><p class="screen-desc">${s.desc}</p>${s.body}`;
  screensEl.appendChild(div);
});

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(el => el.classList.remove("active"));
  document.getElementById("screen-" + id).classList.add("active");
  document.querySelectorAll("nav.screen-tabs button").forEach(b => {
    b.classList.toggle("active", b.dataset.target === id);
  });
}
